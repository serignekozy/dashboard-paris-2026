*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:14px;-webkit-font-smoothing:antialiased}
.hdr{background:#fff;padding:20px 18px 16px;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.htag{font-size:11px;color:#8e8e93;letter-spacing:0.04em;margin-bottom:4px}
.htitle{font-size:26px;font-weight:600;color:#1c1c1e;letter-spacing:-0.5px}
.htitle span{color:#007aff}
.hmeta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.hpill{font-size:11px;background:#f2f2f7;color:#8e8e93;padding:3px 10px;border-radius:20px}
.hpill.blue{background:#e8f3ff;color:#007aff}
.vtabs{display:flex;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);overflow-x:auto;-webkit-overflow-scrolling:touch}
.vtab{flex:1;min-width:65px;padding:10px 4px;font-size:10px;color:#8e8e93;cursor:pointer;border-bottom:2px solid transparent;text-align:center;line-height:1.4;transition:all .2s;white-space:nowrap}
.vtab.on{color:#007aff;border-bottom-color:#007aff}
.mtabs{display:flex;background:#f2f2f7;padding:8px 12px;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mtab{font-size:11px;color:#8e8e93;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;background:#fff;border:0.5px solid rgba(0,0,0,0.08)}
.mtab.on{background:#007aff;color:#fff;border-color:#007aff}
.mtab.dim{opacity:.4;pointer-events:none}
.main{padding:16px;max-width:900px;margin:0 auto}
.view{display:none}.view.on{display:block}
.sec{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:0.04em;text-transform:uppercase;margin:20px 0 6px}
.sec:first-child{margin-top:0}
.sec-explain{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #007aff}
.sec-explain p{font-size:12px;color:#3c3c43;line-height:1.6;margin:0}
.sec-explain strong{color:#1c1c1e}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.kc{background:#fff;border-radius:14px;padding:14px;position:relative}
.kico{width:28px;height:28px;border-radius:8px;margin-bottom:8px}
.kico.up{background:#30d158}.kico.dn{background:#ff3b30}.kico.wn{background:#ff9f0a}.kico.bl{background:#007aff}.kico.gd{background:#ffd60a}.kico.nt{background:#e5e5ea}
.kl{font-size:11px;color:#8e8e93;margin-bottom:4px;line-height:1.3}
.kv{font-size:22px;font-weight:600;color:#1c1c1e;letter-spacing:-0.5px;line-height:1}
.ks{font-size:11px;margin-top:3px}
.ks.up{color:#30d158}.ks.dn{color:#ff3b30}.ks.wn{color:#ff9f0a}.ks.bl{color:#007aff}.ks.nt{color:#8e8e93}
.kcomment{font-size:10px;color:#8e8e93;margin-top:6px;line-height:1.4;border-top:0.5px solid rgba(0,0,0,0.06);padding-top:6px}
.ksrc{font-size:9px;color:#c7c7cc;margin-top:4px}
.al{border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.al.ok{background:#e8faf0}.al.danger{background:#fff2f2}.al.warning{background:#fff8ec}.al.info{background:#e8f3ff}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.al.ok .adot{background:#30d158}.al.danger .adot{background:#ff3b30}.al.warning .adot{background:#ff9f0a}.al.info .adot{background:#007aff}
.atit{font-size:12px;font-weight:600;margin-bottom:3px}
.al.ok .atit{color:#1a7a3c}.al.danger .atit{color:#cc2200}.al.warning .atit{color:#a05a00}.al.info .atit{color:#005bb5}
.abod{font-size:11px;line-height:1.6}
.al.ok .abod{color:#2d6a4a}.al.danger .abod{color:#7f1d1d}.al.warning .abod{color:#78450a}.al.info .abod{color:#1e40af}
.actions{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px}
.actions-title{font-size:12px;font-weight:600;color:#1c1c1e;margin-bottom:10px}
.action-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.action-item:last-child{border-bottom:none;padding-bottom:0}
.action-dot{width:6px;height:6px;border-radius:50%;background:#007aff;flex-shrink:0;margin-top:4px}
.action-text{font-size:11px;color:#3c3c43;line-height:1.5}
.action-text strong{color:#1c1c1e;display:block;margin-bottom:1px}
.tr-w{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.tr{background:#fff;border-radius:12px;padding:10px 14px}
.tr-top{display:flex;align-items:center;gap:10px}
.trm{font-size:10px;color:#8e8e93;min-width:42px;font-weight:500}
.trl{flex:1;font-size:11px;color:#3c3c43;font-weight:500}
.trv{font-size:12px;font-weight:600;text-align:right}
.trv.up{color:#30d158}.trv.dn{color:#ff3b30}.trv.wn{color:#ff9f0a}.trv.nt{color:#8e8e93}
.tr-comment{font-size:10px;color:#8e8e93;margin-top:5px;padding-top:5px;border-top:0.5px solid rgba(0,0,0,0.06);line-height:1.5}
.tw{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#f9f9f9;font-size:10px;font-weight:600;color:#8e8e93;padding:10px 12px;text-align:left;border-bottom:0.5px solid rgba(0,0,0,0.08);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:0.5px solid rgba(0,0,0,0.05);color:#3c3c43;vertical-align:top}
tbody tr:last-child td{border-bottom:none}
.ti{font-weight:600;color:#1c1c1e;font-size:12px}
.b{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b.up{background:#e8faf0;color:#1a7a3c}.b.dn{background:#fff2f2;color:#cc2200}.b.wn{background:#fff8ec;color:#a05a00}.b.bl{background:#e8f3ff;color:#005bb5}.b.nt{background:#f2f2f7;color:#8e8e93}

/* Score composite */
.score-hero{background:#fff;border-radius:18px;padding:24px;margin-bottom:12px;text-align:center}
.score-month{font-size:12px;color:#8e8e93;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:6px solid}
.score-circle.s-great{border-color:#30d158;background:#e8faf0}
.score-circle.s-good{border-color:#30d158;background:#e8faf0}
.score-circle.s-ok{border-color:#ff9f0a;background:#fff8ec}
.score-circle.s-bad{border-color:#ff3b30;background:#fff2f2}
.score-circle.s-na{border-color:#e5e5ea;background:#f9f9f9}
.score-num{font-size:32px;font-weight:700;line-height:1}
.score-circle.s-great .score-num{color:#1a7a3c}
.score-circle.s-good .score-num{color:#1a7a3c}
.score-circle.s-ok .score-num{color:#a05a00}
.score-circle.s-bad .score-num{color:#cc2200}
.score-circle.s-na .score-num{color:#8e8e93}
.score-label{font-size:10px;font-weight:600;margin-top:2px}
.score-circle.s-great .score-label{color:#1a7a3c}
.score-circle.s-good .score-label{color:#1a7a3c}

.score-circle.s-bad .score-label{color:#cc2200}
.score-circle.s-na .score-label{color:#8e8e93}
.score-verdict{font-size:14px;font-weight:600;color:#1c1c1e;margin-bottom:4px}
.score-sub{font-size:12px;color:#8e8e93}
.score-bar-wrap{background:#f2f2f7;border-radius:8px;height:10px;overflow:hidden;margin:12px 0 4px}
.score-bar{height:100%;border-radius:8px;transition:width 0.5s}
.score-bar.s-great{background:#30d158}
.score-bar.s-good{background:#30d158}
.score-bar.s-ok{background:#ff9f0a}
.score-bar.s-bad{background:#ff3b30}
.score-bar.s-na{background:#e5e5ea}
.score-signals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.signal-card{background:#fff;border-radius:12px;padding:12px}
.signal-name{font-size:10px;color:#8e8e93;margin-bottom:4px}
.signal-val{font-size:13px;font-weight:600;margin-bottom:2px}
.signal-val.up{color:#30d158}.signal-val.dn{color:#ff3b30}.signal-val.wn{color:#ff9f0a}.signal-val.nt{color:#8e8e93}
.signal-contrib{font-size:10px;color:#8e8e93}
.signal-bar-wrap{background:#f2f2f7;border-radius:4px;height:4px;overflow:hidden;margin-top:6px}
.signal-bar{height:100%;border-radius:4px}
.signal-bar.up{background:#30d158}.signal-bar.dn{background:#ff3b30}.signal-bar.wn{background:#ff9f0a}.signal-bar.nt{background:#e5e5ea}
.score-all{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px}
.score-all-row{display:flex;align-items:center;padding:10px 14px;border-bottom:0.5px solid rgba(0,0,0,0.05)}
.score-all-row:last-child{border-bottom:none}
.score-all-m{font-size:12px;font-weight:600;color:#1c1c1e;min-width:90px}
.score-all-bar-wrap{flex:1;background:#f2f2f7;border-radius:6px;height:8px;overflow:hidden;margin:0 12px}
.score-all-bar{height:100%;border-radius:6px}
.score-all-num{font-size:12px;font-weight:600;min-width:40px;text-align:right}
.ftr{margin-top:24px;padding-top:14px;border-top:0.5px solid rgba(0,0,0,0.08)}
.fnote{font-size:10px;color:#c7c7cc;text-align:center}
</style>

// ── Score composite ──────────────────────────────────────────
function calcScore(idx){
  var r=KPI[idx];
  if(r.st==="À venir") return null;
  var pts=0, max=0;

  // Arrivées aériennes (25 pts)
  if(r.ai!==null){
    max+=25;
    if(r.ai>=10) pts+=25;
    else if(r.ai>=0) pts+=18;
    else if(r.ai>=-3) pts+=10;
    else pts+=0;
  }

  // TO hôtelier (20 pts)
  if(r.to!==null){
    max+=20;
    if(r.to>=80) pts+=20;
    else if(r.to>=70) pts+=15;
    else if(r.to>=60) pts+=8;
    else pts+=2;
  }

  // Nuitées françaises (20 pts) — négatif = Parisiens absents = mauvais
  if(r.nfr!==null){
    max+=20;
    if(r.nfr>=0) pts+=20;
    else if(r.nfr>=-3) pts+=14;
    else if(r.nfr>=-6) pts+=8;
    else pts+=2;
  }

  // INSEE (15 pts)
  var ins=INSEE[idx];
  if(ins&&ins.ind!==null){
    max+=15;
    if(ins.ind>=95) pts+=15;
    else if(ins.ind>=90) pts+=10;
    else if(ins.ind>=85) pts+=6;
    else pts+=2;
  }

  // Disney (10 pts) — fort afflux = bon pour touristes mais pas résidentiels → signal mixte
  var dis=DISNEY[idx];
  if(dis){
    max+=10;
    var dc=cc(dis.col);
    if(dc==="up") pts+=10;
    else if(dc==="bl") pts+=8;
    else if(dc==="wn") pts+=6;
    else pts+=3;
  }

  // Agenda événementiel (10 pts)
  max+=10;
  var mois=r.m;
  var agScore=5; // base neutre
  AGENDA.forEach(function(a){
    if(a.date.toLowerCase().indexOf(mois.toLowerCase().slice(0,3))!==-1||
       a.ev.toLowerCase().indexOf(mois.toLowerCase().slice(0,3))!==-1){
      if(a.imp==="Très fort") agScore=Math.min(10,agScore+3);
      else if(a.imp==="Fort") agScore=Math.min(10,agScore+2);
      else if(a.imp==="Modéré") agScore=Math.min(10,agScore+1);
    }
  });
  pts+=agScore;

  if(max===0) return null;
  return Math.round((pts/max)*100);
}

function scoreClass(s){
  if(s===null) return "s-na";
  if(s>=70) return "s-great";
  if(s>=50) return "s-good";
  if(s>=35) return "s-ok";
  return "s-bad";
}

function scoreVerdict(s){
  if(s===null) return {v:"Données insuffisantes",sub:"Disponible en fin de mois"};
  if(s>=70) return {v:"Excellent mois prévu",sub:"Tous les signaux sont au vert"};
  if(s>=50) return {v:"Bon mois prévu",sub:"Signaux majoritairement positifs"};
  if(s>=35) return {v:"Mois modéré",sub:"Signaux mitigés — rester prudent"};
  return {v:"Mois difficile",sub:"La majorité des signaux sont négatifs"};
}

// ── Utilitaires ──────────────────────────────────────────────
function cc(v){var s=(v||"").toLowerCase();if(s==="vert"||s==="positif"||s==="ok")return"up";if(s==="rouge"||s==="danger")return"dn";if(s==="orange"||s==="warning"||s==="mixte")return"wn";if(s==="bleu"||s==="info")return"bl";return"nt";}
function nc(v){if(v===null||v===undefined) return "nt"; var n=parseFloat(v);return isNaN(n)?"nt":(n>0?"up":(n<0?"dn":"nt"));}
function fmt(v,suf){if(v===null||v===undefined) return "N/D"; return (v>0?"+":"")+v+(suf||"");}
function atype(c){return c==="up"?"ok":c==="dn"?"danger":c==="wn"?"warning":"info";}
function badge(v,c){return'<span class="b '+(c||"nt")+'">'+v+"</span>";}
function kcard(label,val,sub,cls,src,comment){return'<div class="kc"><div class="kico '+cls+'"></div><div class="kl">'+label+'</div><div class="kv">'+val+'</div><div class="ks '+cls+'">'+sub+'</div>'+(comment?'<div class="kcomment">'+comment+'</div>':'')+'<div class="ksrc">'+src+'</div></div>';}
function se(text){return'<div class="sec-explain"><p>'+text+'</p></div>';}

function buildTabs(){
  var el=document.getElementById("mtabs");el.innerHTML="";var last=0;
  KPI.forEach(function(r,i){
    var dim=r.st==="À venir";

    d.className="mtab"+(dim?" dim":"");

    if(!dim){last=i;(function(idx){d.onclick=function(){cur=idx;refreshTabs();renderMonthly(idx);};})(i);}

  });

}
