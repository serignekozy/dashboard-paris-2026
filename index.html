<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPI — Paris 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:14px}
.hdr{background:#fff;padding:20px 18px 16px;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.htag{font-size:11px;color:#8e8e93;letter-spacing:0.04em;margin-bottom:4px}
.htitle{font-size:26px;font-weight:600;color:#1c1c1e;letter-spacing:-0.5px}
.htitle span{color:#007aff}
.hmeta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.hpill{font-size:11px;background:#f2f2f7;color:#8e8e93;padding:3px 10px;border-radius:20px}
.hpill.blue{background:#e8f3ff;color:#007aff}
.vtabs{display:flex;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);overflow-x:auto}
.vtab{flex:1;min-width:70px;padding:10px 4px;font-size:10px;color:#8e8e93;cursor:pointer;border-bottom:2px solid transparent;text-align:center;line-height:1.4;transition:all .2s}
.vtab.on{color:#007aff;border-bottom-color:#007aff}
.mtabs{display:flex;background:#f2f2f7;padding:8px 12px;gap:6px;overflow-x:auto}
.mtab{font-size:11px;color:#8e8e93;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;background:#fff;border:0.5px solid rgba(0,0,0,0.08)}
.mtab.on{background:#007aff;color:#fff;border-color:#007aff}
.mtab.dim{opacity:.4;pointer-events:none}
.main{padding:16px;max-width:900px;margin:0 auto}
.view{display:none}.view.on{display:block}

/* Section headers */
.sec{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:0.04em;text-transform:uppercase;margin:20px 0 6px}
.sec:first-child{margin-top:0}
.sec-explain{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #007aff}
.sec-explain p{font-size:12px;color:#3c3c43;line-height:1.6;margin:0}
.sec-explain strong{color:#1c1c1e}

/* KPI cards */
.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.kc{background:#fff;border-radius:14px;padding:14px}
.kico{width:28px;height:28px;border-radius:8px;margin-bottom:8px}
.kico.up{background:#30d158}.kico.dn{background:#ff3b30}.kico.wn{background:#ff9f0a}.kico.bl{background:#007aff}.kico.gd{background:#ffd60a}.kico.nt{background:#e5e5ea}
.kl{font-size:11px;color:#8e8e93;margin-bottom:4px;line-height:1.3}
.kv{font-size:22px;font-weight:600;color:#1c1c1e;letter-spacing:-0.5px;line-height:1}
.ks{font-size:11px;margin-top:3px}
.ks.up{color:#30d158}.ks.dn{color:#ff3b30}.ks.wn{color:#ff9f0a}.ks.bl{color:#007aff}.ks.nt{color:#8e8e93}
.kcomment{font-size:10px;color:#8e8e93;margin-top:6px;line-height:1.4;border-top:0.5px solid rgba(0,0,0,0.06);padding-top:6px}
.ksrc{font-size:9px;color:#c7c7cc;margin-top:4px}

/* Alertes */
.al{border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.al.ok{background:#e8faf0}.al.danger{background:#fff2f2}.al.warning{background:#fff8ec}.al.info{background:#e8f3ff}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.al.ok .adot{background:#30d158}.al.danger .adot{background:#ff3b30}.al.warning .adot{background:#ff9f0a}.al.info .adot{background:#007aff}
.atit{font-size:12px;font-weight:600;margin-bottom:3px}
.al.ok .atit{color:#1a7a3c}.al.danger .atit{color:#cc2200}.al.warning .atit{color:#a05a00}.al.info .atit{color:#005bb5}
.abod{font-size:11px;line-height:1.6}
.al.ok .abod{color:#2d6a4a}.al.danger .abod{color:#7f1d1d}.al.warning .abod{color:#78450a}.al.info .abod{color:#1e40af}

/* Actions block */
.actions{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px}
.actions-title{font-size:12px;font-weight:600;color:#1c1c1e;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.action-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.action-item:last-child{border-bottom:none;padding-bottom:0}
.action-dot{width:6px;height:6px;border-radius:50%;background:#007aff;flex-shrink:0;margin-top:4px}
.action-text{font-size:11px;color:#3c3c43;line-height:1.5}
.action-text strong{color:#1c1c1e;display:block;margin-bottom:1px}

/* Tendance rows */
.tr-w{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.tr{background:#fff;border-radius:12px;padding:10px 14px}
.tr-top{display:flex;align-items:center;gap:10px}
.trm{font-size:10px;color:#8e8e93;min-width:42px;font-weight:500}
.trl{flex:1;font-size:11px;color:#3c3c43;font-weight:500}
.trv{font-size:12px;font-weight:600;text-align:right}
.trv.up{color:#30d158}.trv.dn{color:#ff3b30}.trv.wn{color:#ff9f0a}.trv.nt{color:#8e8e93}
.tr-comment{font-size:10px;color:#8e8e93;margin-top:5px;padding-top:5px;border-top:0.5px solid rgba(0,0,0,0.06);line-height:1.5}
.dim{opacity:.4}

/* Tables */
.tw{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#f9f9f9;font-size:10px;font-weight:600;color:#8e8e93;padding:10px 12px;text-align:left;border-bottom:0.5px solid rgba(0,0,0,0.08);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:0.5px solid rgba(0,0,0,0.05);color:#3c3c43;vertical-align:top}
tbody tr:last-child td{border-bottom:none}
.ti{font-weight:600;color:#1c1c1e;font-size:12px}
.b{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b.up{background:#e8faf0;color:#1a7a3c}.b.dn{background:#fff2f2;color:#cc2200}.b.wn{background:#fff8ec;color:#a05a00}.b.bl{background:#e8f3ff;color:#005bb5}.b.nt{background:#f2f2f7;color:#8e8e93}

.ftr{margin-top:24px;padding-top:14px;border-top:0.5px solid rgba(0,0,0,0.08)}
.fnote{font-size:10px;color:#c7c7cc;text-align:center}
</style>
</head>

function badge(v,c){return'<span class="b '+(c||"nt")+'">'+v+"</span>";}

function kcard(label,val,sub,cls,src,comment){
  return'<div class="kc"><div class="kico '+cls+'"></div><div class="kl">'+label+'</div><div class="kv">'+val+'</div><div class="ks '+cls+'">'+sub+'</div>'+(comment?'<div class="kcomment">'+comment+'</div>':'')+'<div class="ksrc">'+src+'</div></div>';
}

function secExplain(text){
  return'<div class="sec-explain"><p>'+text+'</p></div>';
}

function buildTabs(){
  var el=document.getElementById("mtabs");el.innerHTML="";var last=0;
  KPI.forEach(function(r,i){
    var dim=r.st===""||r.st==="À venir";
    var d=document.createElement("div");
    d.className="mtab"+(dim?" dim":"");
    d.textContent=MOIS_COURTS[i];
    if(!dim){last=i;(function(idx){d.onclick=function(){cur=idx;refreshTabs();renderMonthly(idx);};})(i);}
    el.appendChild(d);
  });
  cur=last;refreshTabs();
}

function refreshTabs(){document.querySelectorAll(".mtab").forEach(function(t,i){t.classList.toggle("on",i===cur);});}

function renderMonthly(idx){
  var r=KPI[idx];
  var cls=cc(r.col);
  var html="";

  html+='<div class="sec">Hôtellerie & Trafic — '+r.m+"</div>";
  html+=secExplain("Le <strong>taux d'occupation hôtelier (TO)</strong> mesure combien de chambres sont remplies à Paris. C'est le meilleur proxy du flux touristique global — quand les hôtels sont pleins, les restaurants le sont aussi. Les <strong>arrivées aériennes</strong> anticipent ce flux 2 à 4 semaines à l'avance.");
  html+='<div class="kg">';
  html+=kcard("TO hôtelier Paris",r.to!=="N/D"?r.to+" %":"N/D",r.toe!=="N/D"?r.toe+" pts vs 2025":"—","up","MKG",r.comment_to);
  html+=kcard("Arrivées aériennes intl.",r.ai!=="N/D"?r.ai+" %":"N/D","vs même mois 2025",nc(r.ai),"ForwardKeys",r.comment_ai);
  html+=kcard("Prix moyen chambre",r.px!=="N/D"?r.px+" €":"N/D","par nuit · Paris","gd","MKG",r.comment_prix);
  html+=kcard("Trafic CDG+Orly",r.adp!=="N/D"?r.adp+" %":"N/D","vs même mois 2025",nc(r.adp),"ADP","Le trafic aéroport confirme ou infirme les arrivées aériennes. Un écart entre les deux peut signaler des voyages domestiques.");
  html+="</div>";

  html+='<div class="sec">Nuitées & Marchés</div>';
  html+=secExplain("Les <strong>nuitées françaises</strong> mesurent la présence des Parisiens à Paris — quand elles baissent, les résidents sont partis en vacances. Les <strong>nuitées étrangères</strong> montrent si les touristes compensent. Les <strong>signaux US et UK</strong> sont clés car ce sont les deux premiers marchés émetteurs de Paris.");
  html+='<div class="kg">';
  html+=kcard("Nuitées françaises",r.nfr!=="N/D"?r.nfr+" %":"N/D","vs même mois 2025",nc(r.nfr),"Flux Vision Orange",r.comment_nfr);
  html+=kcard("Nuitées étrangers",r.net!=="N/D"?r.net+" %":"N/D","vs même mois 2025",nc(r.net),"Flux Vision Orange","Quand les étrangers compensent la baisse des Français, l'impact sur les restaurants touristiques est limité.");
  html+=kcard("Signal USA",r.us!=="N/D"?r.us+" %":"N/D","vs même mois 2025",nc(r.us),"Paris je t'aime","1er marché émetteur. Un recul US impacte surtout la gastronomie et les zones premium (Marais, St-Germain).");
  html+=kcard("Signal UK",r.uk!=="N/D"?r.uk+" %":"N/D","vs même mois 2025",nc(r.uk),"Paris je t'aime","2ème marché. La clientèle britannique est fidèle à Paris et dépense bien en restauration.");
  html+="</div>";

  html+='<div class="sec">Ce que ça veut dire pour ton restaurant</div>';
  if(r.resto_interpretation){
    var t=atype(cls);
    html+='<div class="al '+t+'"><div class="adot"></div><div><div class="atit">Analyse — '+r.m+" "+r.st+'</div><div class="abod">'+r.resto_interpretation+"</div></div></div>";
  }

  if(r.actions && r.actions.length>0){
    html+='<div class="sec">Actions recommandées</div>';
    html+=secExplain("Traduction opérationnelle des données ci-dessus. Ces actions sont à discuter avec tes managers en réunion mensuelle.");
    html+='<div class="actions"><div class="actions-title">✦ À faire ce mois-ci</div>';
    r.actions.forEach(function(a){
      var parts=a.split(":");
      html+='<div class="action-item"><div class="action-dot"></div><div class="action-text">'+(parts.length>1?'<strong>'+parts[0]+'</strong>'+parts.slice(1).join(":"):"<strong>"+a+"</strong>")+"</div></div>";
    });
    html+="</div>";
  }

  document.getElementById("content-monthly").innerHTML=html;
}

function renderEvolution(){
  var html='<div class="sec">Comment lire cette section ?</div>';
  html+=secExplain("L'<strong>évolution mensuelle</strong> te permet de repérer les tendances sur l'année. Un chiffre en vert = amélioration vs même mois 2025. En rouge = dégradation. L'objectif est d'anticiper les mois à venir en observant la direction prise depuis janvier.");
  html+='<div class="sec">Arrivées aériennes — évolution mensuelle vs 2025</div>';
  html+='<div class="tr-w">';
  KPI.forEach(function(r,i){
    var dim=r.st==="À venir";
    var comments={
      "Janvier":"Très fort début d'année — effet post-JO prolongé + marchés US et UK au maximum.",
      "Février":"Premier signal de ralentissement. Le retournement aérien commence.",
      "Mars":"Poursuite du ralentissement. Perturbation Moyen-Orient se fait sentir.",
      "Avril":"Signal le plus négatif du semestre. Double creux attendu."
    };
    html+='<div class="tr'+(dim?" dim":"")+'"><div class="tr-top"><span class="trm">'+MOIS_COURTS[i]+'</span><span class="trl">'+r.m+" — "+r.st+'</span><span class="trv '+nc(r.ai)+'">'+(r.ai!=="N/D"?r.ai+" %":"N/D")+"</span></div>";
    if(comments[r.m])html+='<div class="tr-comment">'+comments[r.m]+"</div>";
    html+="</div>";
  });
  html+="</div>";

  html+='<div class="sec">Tableau comparatif — Vue d\'ensemble</div>';
  html+=secExplain("Ce tableau synthétise tous les indicateurs. Lis-le <strong>colonne par colonne</strong> pour repérer les marchés qui progressent ou reculent, et <strong>ligne par ligne</strong> pour comprendre chaque mois dans sa globalité.");
  html+='<div class="tw"><table><thead><tr><th>Mois</th><th>TO hôtelier</th><th>Arrivées</th><th>Nuitées FR</th><th>Signal US</th><th>Statut</th></tr></thead><tbody>';
  KPI.forEach(function(r){
    html+="<tr><td class=\"ti\">"+r.m+"</td>";
    html+="<td>"+badge(r.to!=="N/D"?r.to+" %":"N/D",r.to!=="N/D"?"up":"nt")+"</td>";
    html+="<td>"+badge(r.ai!=="N/D"?r.ai+" %":"N/D",nc(r.ai))+"</td>";
    html+="<td>"+badge(r.nfr!=="N/D"?r.nfr+" %":"N/D",nc(r.nfr))+"</td>";
    html+="<td>"+badge(r.us!=="N/D"?r.us+" %":"N/D",nc(r.us))+"</td>";
    html+="<td>"+badge(r.st,"nt")+"</td></tr>";
  });
  html+="</tbody></table></div>";
  document.getElementById("content-evolution").innerHTML=html;
}

function renderDeparts(){
  var html='<div class="sec">Comment lire cette section ?</div>';
  html+=secExplain("Les <strong>départs parisiens</strong> sont le facteur numéro 1 de variation de fréquentation pour les restaurants de quartier et résidentiels. Quand les Parisiens partent, la clientèle locale disparaît. Ce calendrier te permet d'<strong>anticiper à J-7</strong> tes commandes et ton staffing.");
  html+='<div class="sec">Calendrier des départs & événements 2026</div>';
  html+='<div class="tr-w">';
  DEPARTS.forEach(function(d){
    var cls=cc(d.int);
    html+='<div class="tr"><div class="tr-top"><span class="trm" style="font-size:10px;min-width:55px">'+d.dd+' → '+d.df+'</span><span class="trl">'+d.ev+'</span><span class="trv '+cls+'">'+d.int+'</span></div>';
    html+='<div class="tr-comment"><strong style="color:#1c1c1e">Action :</strong> '+d.act+' · <span style="color:#8e8e93">'+d.comment+"</span></div>";
    html+="</div>";
  });
  html+="</div>";
  document.getElementById("content-departs").innerHTML=html;
}

function renderDisney(){
  var html='<div class="sec">Pourquoi suivre Disneyland Paris ?</div>';
  html+=secExplain("Disneyland Paris est le <strong>1er parc d'attractions européen</strong> avec 16 millions de visiteurs/an. Son affluence est un excellent proxy des flux familiaux et touristiques en Île-de-France. Quand le parc est saturé, les familles débordent vers Paris et sa restauration. <strong>Nouveauté 2026 :</strong> ouverture du Land Reine des Neiges le 29 mars — impact sur toute l'année.");
  html+='<div class="sec">Baromètre mensuel — Affluence & Impact restauration</div>';
  html+='<div class="tr-w">';
  DISNEY.forEach(function(d,i){
    var cls=cc(d.col);
    html+='<div class="tr"><div class="tr-top"><span class="trm">'+MOIS_COURTS[i]+'</span><span class="trl">'+d.m+' — '+d.note+'</span><span class="trv '+cls+'">'+d.niv+'</span></div>';
    html+='<div class="tr-comment"><strong style="color:#1c1c1e">Impact resto :</strong> '+d.impact+"</div>";
    html+="</div>";
  });
  html+="</div>";
  document.getElementById("content-disney").innerHTML=html;
}

function renderInsee(){
  var html='<div class="sec">Pourquoi suivre l\'indice INSEE ?</div>';
  html+=secExplain("L'<strong>indice de confiance des ménages INSEE</strong> mesure le moral économique des Français. La moyenne historique est <strong>100</strong>. En dessous = les ménages sont pessimistes et réduisent leurs dépenses discrétionnaires — dont la restauration. C'est un <strong>indicateur avancé à 30-60 jours</strong> : si l'indice baisse en mars, les sorties resto baissent en avril-mai. Publié chaque fin de mois.");
  html+='<div class="sec">Évolution mensuelle — Indice & Inflation</div>';
  html+='<div class="tr-w">';
  INSEE.forEach(function(r){
    var cls=cc(r.sig);
    html+='<div class="tr'+(r.indice==="N/D"?" dim":"")+'"><div class="tr-top"><span class="trm" style="font-size:18px;font-weight:600;color:#1c1c1e;min-width:44px">'+(r.indice!=="N/D"?r.indice:"—")+'</span><span class="trl">'+r.m+(r.evol!=="N/D"?' · évol. '+r.evol:"")+(r.inflation!=="N/D"?' · inflation '+r.inflation+'%':" — à venir")+'</span><span class="trv '+cls+'">'+(r.sig==="gris"?"À venir":r.sig==="rouge"?"Attention":r.sig==="orange"?"Prudence":"Stable")+"</span></div>";
    if(r.note)html+='<div class="tr-comment">'+r.note+(r.action?'<br><strong style="color:#007aff">→ '+r.action+"</strong>":"")+"</div>";
    html+="</div>";
  });
  html+="</div>";
  document.getElementById("content-insee").innerHTML=html;
}

function setView(v){
  ["monthly","evolution","departs","disney","insee"].forEach(function(id){
    document.getElementById("view-"+id).classList.remove("on");
    document.getElementById("vt-"+id).classList.remove("on");
  });
  document.getElementById("view-"+v).classList.add("on");
  document.getElementById("vt-"+v).classList.add("on");
  document.getElementById("mtabs").style.display=v==="monthly"?"flex":"none";
}

window.onload=function(){
  document.getElementById("last-update").textContent="MàJ "+DERNIERE_MAJ;
  var actifs=KPI.filter(function(r){return r.st!=="À venir"&&r.st!==""});
  document.getElementById("mois-actifs").textContent=actifs.length+" mois consolidés";
  buildTabs();renderMonthly(cur);renderEvolution();renderDeparts();renderDisney();renderInsee();
};
</script>

  <div class="htag">Tourisme · Restauration · Paris</div>
  <div class="htitle">Dashboard <span>2026</span></div>

    <span class="hpill" id="last-update">—</span>

</div>

</div>

  <div class="view" id="view-disney"><div id="content-disney"></div></div>
